version: "3.8"

# ==============================================================================
# Infrastructure: PostgreSQL + ClickHouse 2-node cluster + Zookeeper
#
# Services:
#   postgres      — import log storage (port 5432)
#   zookeeper     — ClickHouse replication coordination (port 2181)
#   clickhouse1   — ClickHouse Node 1 (HTTP: 8123, TCP: 9000)
#   clickhouse2   — ClickHouse Node 2 (HTTP: 8124, TCP: 9001)
#
# Usage:
#   docker-compose up -d
#   Swagger UI: http://localhost:8080/swagger-ui.html (after starting the app)
# ==============================================================================

networks:
  app-net:
    driver: bridge

volumes:
  postgres-data:
  zookeeper-data:
  zookeeper-logs:
  clickhouse1-data:
  clickhouse2-data:

services:

  # ────────────────────────────────────────────────────────────────────────────
  # PostgreSQL — stores import operation logs
  # ────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    hostname: postgres
    networks:
      - app-net
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: importdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d importdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ────────────────────────────────────────────────────────────────────────────
  # Zookeeper — required for ClickHouse ReplicatedMergeTree
  # ────────────────────────────────────────────────────────────────────────────
  zookeeper:
    image: zookeeper:3.8
    container_name: zookeeper
    hostname: zookeeper
    networks:
      - app-net
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/data
      - zookeeper-logs:/datalog
    environment:
      ZOO_MY_ID: 1
      ZOO_SERVERS: server.1=zookeeper:2888:3888;2181
      ZOO_4LW_COMMANDS_WHITELIST: "mntr,conf,ruok"
    healthcheck:
      test: ["CMD", "zkServer.sh", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ────────────────────────────────────────────────────────────────────────────
  # ClickHouse Node 1 — HTTP :8123, TCP :9000
  # ────────────────────────────────────────────────────────────────────────────
  clickhouse1:
    image: clickhouse/clickhouse-server:24.3
    container_name: clickhouse1
    hostname: clickhouse1
    networks:
      - app-net
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse1-data:/var/lib/clickhouse
      - ./clickhouse-config/config.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
      - ./clickhouse-config/users.xml:/etc/clickhouse-server/users.d/custom-users.xml:ro
      - ./clickhouse-config/macros-node1.xml:/etc/clickhouse-server/config.d/macros.xml:ro
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    ulimits:
      nproc: 65535
      nofile:
        soft: 262144
        hard: 262144

  # ────────────────────────────────────────────────────────────────────────────
  # ClickHouse Node 2 — HTTP :8124, TCP :9001
  # ────────────────────────────────────────────────────────────────────────────
  clickhouse2:
    image: clickhouse/clickhouse-server:24.3
    container_name: clickhouse2
    hostname: clickhouse2
    networks:
      - app-net
    ports:
      - "8124:8123"
      - "9001:9000"
    volumes:
      - clickhouse2-data:/var/lib/clickhouse
      - ./clickhouse-config/config.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
      - ./clickhouse-config/users.xml:/etc/clickhouse-server/users.d/custom-users.xml:ro
      - ./clickhouse-config/macros-node2.xml:/etc/clickhouse-server/config.d/macros.xml:ro
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    ulimits:
      nproc: 65535
      nofile:
        soft: 262144
        hard: 262144
